<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano Armonía - Enarmonías</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        .piano {
            display: flex;
            position: relative;
            background: #222;
            padding: 10px 5px 40px 5px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .key {
            position: relative;
            width: 60px;
            height: 200px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 0 0 5px 5px;
            cursor: pointer;
            transition: background 0.2s;
            z-index: 1;
        }

        .key:hover {
            background: #eee;
        }

        .key.black {
            width: 40px;
            height: 120px;
            background: #333;
            margin-left: -20px;
            margin-right: -20px;
            z-index: 2;
            border: none;
        }

        .key.black:hover {
            background: #444;
        }

        /* Estilo de selección (Azul) */
        .key.selected {
            background: #3498db !important;
            box-shadow: inset 0 -10px 0 #2980b9;
        }

        .key.black.selected {
            background: #2980b9 !important;
        }

        /* Etiquetas de notas */
        .key::after {
            content: attr(data-note);
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            font-weight: bold;
            color: #888;
            pointer-events: none;
            text-align: center;
            white-space: pre-wrap;
            line-height: 1.2;
        }

        /* Ajuste para teclas negras (Enarmonías) */
        .key.black::after {
            color: #fff;
            bottom: 8px;
            font-size: 10px;
        }

        .key.selected::after {
            color: white !important;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: 0.3s;
            color: white;
            font-weight: bold;
            min-width: 150px;
        }

        .btn-play {
            background: #2ecc71;
        }

        .btn-play.active {
            background: #e67e22;
        }

        .btn-clear {
            background: #e74c3c;
        }

        .btn-clear:hover {
            background: #c0392b;
        }
    </style>
</head>

<body>

    <h1>Piano Calculadora</h1>

    <div class="piano" id="piano">
        <div class="key" data-note="Do" data-freq="130.81"></div>
        <div class="key black" data-note="Do#&#10;Re♭" data-freq="138.59"></div>
        <div class="key" data-note="Re" data-freq="146.83"></div>
        <div class="key black" data-note="Re#&#10;Mi♭" data-freq="155.56"></div>
        <div class="key" data-note="Mi" data-freq="164.81"></div>
        <div class="key" data-note="Fa" data-freq="174.61"></div>
        <div class="key black" data-note="Fa#&#10;Sol♭" data-freq="185.00"></div>
        <div class="key" data-note="Sol" data-freq="196.00"></div>
        <div class="key black" data-note="Sol#&#10;La♭" data-freq="207.65"></div>
        <div class="key" data-note="La" data-freq="220.00"></div>
        <div class="key black" data-note="La#&#10;Si♭" data-freq="233.08"></div>
        <div class="key" data-note="Si" data-freq="246.94"></div>

        <div class="key" data-note="Do" data-freq="261.63"></div>
        <div class="key black" data-note="Do#&#10;Re♭" data-freq="277.18"></div>
        <div class="key" data-note="Re" data-freq="293.66"></div>
        <div class="key black" data-note="Re#&#10;Mi♭" data-freq="311.13"></div>
        <div class="key" data-note="Mi" data-freq="329.63"></div>
        <div class="key" data-note="Fa" data-freq="349.23"></div>
        <div class="key black" data-note="Fa#&#10;Sol♭" data-freq="369.99"></div>
        <div class="key" data-note="Sol" data-freq="392.00"></div>
        <div class="key black" data-note="Sol#&#10;La♭" data-freq="415.30"></div>
        <div class="key" data-note="La" data-freq="440.00"></div>
        <div class="key black" data-note="La#&#10;Si♭" data-freq="466.16"></div>
        <div class="key" data-note="Si" data-freq="493.88"></div>

        <div class="key" data-note="Do" data-freq="523.25"></div>
    </div>

    <div class="controls">
        <button id="playBtn" class="btn-play" onclick="togglePlay()">Play / Pausa</button>
        <button class="btn-clear" onclick="clearAll()">Limpiar Todo</button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const keys = document.querySelectorAll('.key');
        const activeNodes = new Map();
        let isAudioPlaying = false;

        function startNote(keyElement, freq) {
            if (activeNodes.has(keyElement)) stopNote(keyElement);

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.25, audioCtx.currentTime + 0.1);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            activeNodes.set(keyElement, { oscillator: osc, gainNode: gain });
        }

        function stopNote(keyElement) {
            const node = activeNodes.get(keyElement);
            if (node) {
                const now = audioCtx.currentTime;
                node.gainNode.gain.cancelScheduledValues(now);
                node.gainNode.gain.setValueAtTime(node.gainNode.gain.value, now);
                node.gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                node.oscillator.stop(now + 0.5);
                activeNodes.delete(keyElement);
            }
        }

        keys.forEach(key => {
            key.addEventListener('mousedown', () => {
                key.classList.toggle('selected');

                if (isAudioPlaying) {
                    if (key.classList.contains('selected')) {
                        startNote(key, parseFloat(key.getAttribute('data-freq')));
                    } else {
                        stopNote(key);
                    }
                }
            });
        });

        function togglePlay() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const btn = document.getElementById('playBtn');

            if (!isAudioPlaying) {
                isAudioPlaying = true;
                btn.classList.add('active');
                keys.forEach(key => {
                    if (key.classList.contains('selected')) {
                        startNote(key, parseFloat(key.getAttribute('data-freq')));
                    }
                });
            } else {
                isAudioPlaying = false;
                btn.classList.remove('active');
                keys.forEach(key => stopNote(key));
            }
        }

        function clearAll() {
            isAudioPlaying = false;
            document.getElementById('playBtn').classList.remove('active');
            keys.forEach(key => {
                stopNote(key);
                key.classList.remove('selected');
            });
        }
    </script>
</body>

</html>
